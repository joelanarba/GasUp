<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="bgPool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E7"/>
      <stop offset="100%" stop-color="#FFE8C4"/>
    </linearGradient>
    <linearGradient id="corridorWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8D5B8"/>
      <stop offset="100%" stop-color="#D4C4A0"/>
    </linearGradient>
    <linearGradient id="doorGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6B4A"/>
      <stop offset="100%" stop-color="#6B4B2A"/>
    </linearGradient>
    <linearGradient id="doorGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0845C"/>
      <stop offset="100%" stop-color="#8B6B4A"/>
    </linearGradient>
    <linearGradient id="routeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0521E"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#E0521E"/>
    </linearGradient>
    <filter id="pShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#141413" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" rx="16" fill="url(#bgPool)"/>

  <!-- Corridor perspective - top view / isometric feel -->
  <!-- Main corridor floor -->
  <rect x="20" y="50" width="260" height="200" rx="4" fill="url(#corridorWall)"/>

  <!-- Floor pattern (corridor tiles) -->
  <g opacity="0.15" stroke="#8B7355" stroke-width="0.5">
    <line x1="20" y1="90" x2="280" y2="90"/>
    <line x1="20" y1="130" x2="280" y2="130"/>
    <line x1="20" y1="170" x2="280" y2="170"/>
    <line x1="20" y1="210" x2="280" y2="210"/>
    <line x1="80" y1="50" x2="80" y2="250"/>
    <line x1="150" y1="50" x2="150" y2="250"/>
    <line x1="220" y1="50" x2="220" y2="250"/>
  </g>

  <!-- Corridor walls (side view bands) -->
  <rect x="20" y="42" width="260" height="12" rx="2" fill="#C4956A" opacity="0.6"/>
  <rect x="20" y="246" width="260" height="12" rx="2" fill="#C4956A" opacity="0.6"/>

  <!-- Left column of doors -->
  <!-- Door 1 -->
  <g transform="translate(35, 58)" filter="url(#pShadow)">
    <rect x="0" y="0" width="32" height="52" rx="3" fill="url(#doorGrad1)"/>
    <rect x="3" y="3" width="26" height="46" rx="2" fill="#7B5B3A"/>
    <!-- Door panels -->
    <rect x="6" y="6" width="20" height="18" rx="1" fill="#6B4B2A" opacity="0.5"/>
    <rect x="6" y="28" width="20" height="18" rx="1" fill="#6B4B2A" opacity="0.5"/>
    <!-- Door handle -->
    <circle cx="24" cy="28" r="2.5" fill="#C4956A"/>
    <!-- Room number indicator -->
    <rect x="10" y="-6" width="12" height="7" rx="1" fill="#E8D5B8"/>
  </g>

  <!-- Door 2 -->
  <g transform="translate(35, 130)" filter="url(#pShadow)">
    <rect x="0" y="0" width="32" height="52" rx="3" fill="url(#doorGrad2)"/>
    <rect x="3" y="3" width="26" height="46" rx="2" fill="#8B7355"/>
    <rect x="6" y="6" width="20" height="18" rx="1" fill="#7B6345" opacity="0.5"/>
    <rect x="6" y="28" width="20" height="18" rx="1" fill="#7B6345" opacity="0.5"/>
    <circle cx="24" cy="28" r="2.5" fill="#C4956A"/>
    <rect x="10" y="-6" width="12" height="7" rx="1" fill="#E8D5B8"/>
  </g>

  <!-- Door 3 -->
  <g transform="translate(35, 195)" filter="url(#pShadow)">
    <rect x="0" y="0" width="32" height="52" rx="3" fill="url(#doorGrad1)"/>
    <rect x="3" y="3" width="26" height="46" rx="2" fill="#7B5B3A"/>
    <rect x="6" y="6" width="20" height="18" rx="1" fill="#6B4B2A" opacity="0.5"/>
    <rect x="6" y="28" width="20" height="18" rx="1" fill="#6B4B2A" opacity="0.5"/>
    <circle cx="24" cy="28" r="2.5" fill="#C4956A"/>
    <rect x="10" y="-6" width="12" height="7" rx="1" fill="#E8D5B8"/>
  </g>

  <!-- Right column of doors -->
  <!-- Door 4 -->
  <g transform="translate(233, 58)" filter="url(#pShadow)">
    <rect x="0" y="0" width="32" height="52" rx="3" fill="url(#doorGrad2)"/>
    <rect x="3" y="3" width="26" height="46" rx="2" fill="#8B7355"/>
    <rect x="6" y="6" width="20" height="18" rx="1" fill="#7B6345" opacity="0.5"/>
    <rect x="6" y="28" width="20" height="18" rx="1" fill="#7B6345" opacity="0.5"/>
    <circle cx="8" cy="28" r="2.5" fill="#C4956A"/>
    <rect x="10" y="-6" width="12" height="7" rx="1" fill="#E8D5B8"/>
  </g>

  <!-- Door 5 -->
  <g transform="translate(233, 130)" filter="url(#pShadow)">
    <rect x="0" y="0" width="32" height="52" rx="3" fill="url(#doorGrad1)"/>
    <rect x="3" y="3" width="26" height="46" rx="2" fill="#7B5B3A"/>
    <rect x="6" y="6" width="20" height="18" rx="1" fill="#6B4B2A" opacity="0.5"/>
    <rect x="6" y="28" width="20" height="18" rx="1" fill="#6B4B2A" opacity="0.5"/>
    <circle cx="8" cy="28" r="2.5" fill="#C4956A"/>
    <rect x="10" y="-6" width="12" height="7" rx="1" fill="#E8D5B8"/>
  </g>

  <!-- Door 6 -->
  <g transform="translate(233, 195)" filter="url(#pShadow)">
    <rect x="0" y="0" width="32" height="52" rx="3" fill="url(#doorGrad2)"/>
    <rect x="3" y="3" width="26" height="46" rx="2" fill="#8B7355"/>
    <rect x="6" y="6" width="20" height="18" rx="1" fill="#7B6345" opacity="0.5"/>
    <rect x="6" y="28" width="20" height="18" rx="1" fill="#7B6345" opacity="0.5"/>
    <circle cx="8" cy="28" r="2.5" fill="#C4956A"/>
    <rect x="10" y="-6" width="12" height="7" rx="1" fill="#E8D5B8"/>
  </g>

  <!-- Delivery route connecting doors -->
  <g>
    <!-- Main route path -->
    <path d="M67,84 Q100,84 120,84 L150,84 Q170,84 180,84 L233,84"
          stroke="url(#routeGrad)" stroke-width="3" fill="none" stroke-dasharray="8,4"/>

    <!-- Route down on left -->
    <path d="M67,84 Q75,84 75,100 L75,156"
          stroke="#F59E0B" stroke-width="3" fill="none" stroke-dasharray="8,4"/>
    <path d="M67,156 Q75,156 75,156"
          stroke="#F59E0B" stroke-width="2" fill="none"/>

    <!-- Route continues down left -->
    <path d="M75,156 L75,221"
          stroke="#F59E0B" stroke-width="3" fill="none" stroke-dasharray="8,4"/>
    <path d="M67,221 Q75,221 75,221"
          stroke="#F59E0B" stroke-width="2" fill="none"/>

    <!-- Route across to right side -->
    <path d="M75,156 Q150,170 225,156"
          stroke="#E0521E" stroke-width="2.5" fill="none" stroke-dasharray="8,4" opacity="0.7"/>

    <!-- Route down on right -->
    <path d="M233,84 Q225,84 225,100 L225,156"
          stroke="#F59E0B" stroke-width="3" fill="none" stroke-dasharray="8,4"/>
    <path d="M225,156 L225,221"
          stroke="#F59E0B" stroke-width="3" fill="none" stroke-dasharray="8,4"/>
    <path d="M233,221 Q225,221 225,221"
          stroke="#F59E0B" stroke-width="2" fill="none"/>

    <!-- Route waypoint dots at each door -->
    <circle cx="67" cy="84" r="5" fill="#E0521E"/>
    <circle cx="67" cy="84" r="2.5" fill="#FFF8E7"/>

    <circle cx="67" cy="156" r="5" fill="#E0521E"/>
    <circle cx="67" cy="156" r="2.5" fill="#FFF8E7"/>

    <circle cx="67" cy="221" r="5" fill="#E0521E"/>
    <circle cx="67" cy="221" r="2.5" fill="#FFF8E7"/>

    <circle cx="233" cy="84" r="5" fill="#E0521E"/>
    <circle cx="233" cy="84" r="2.5" fill="#FFF8E7"/>

    <circle cx="233" cy="156" r="5" fill="#E0521E"/>
    <circle cx="233" cy="156" r="2.5" fill="#FFF8E7"/>

    <circle cx="233" cy="221" r="5" fill="#E0521E"/>
    <circle cx="233" cy="221" r="2.5" fill="#FFF8E7"/>
  </g>

  <!-- Small delivery motorcycle icon at center of route -->
  <g transform="translate(140, 76)">
    <!-- Simplified motorcycle + cylinder icon -->
    <rect x="0" y="0" width="20" height="10" rx="3" fill="#141413" opacity="0.7"/>
    <circle cx="3" cy="12" r="4" fill="#3A3A3A"/>
    <circle cx="3" cy="12" r="2" fill="#6A6A6A"/>
    <circle cx="17" cy="12" r="4" fill="#3A3A3A"/>
    <circle cx="17" cy="12" r="2" fill="#6A6A6A"/>
    <!-- Tiny cylinder -->
    <rect x="5" y="-6" width="8" height="6" rx="3" fill="#E0521E" opacity="0.8"/>
  </g>

  <!-- People silhouettes near doors (community feel) -->
  <!-- Person at door 1 -->
  <g transform="translate(74, 72)" opacity="0.5">
    <circle cx="0" cy="0" r="4" fill="#8B6B4A"/>
    <rect x="-3" y="5" width="6" height="10" rx="2" fill="#F59E0B"/>
  </g>

  <!-- Person at door 5 -->
  <g transform="translate(228, 144)" opacity="0.5">
    <circle cx="0" cy="0" r="4" fill="#8B6B4A"/>
    <rect x="-3" y="5" width="6" height="10" rx="2" fill="#E0521E"/>
  </g>

  <!-- Person at door 3 -->
  <g transform="translate(74, 208)" opacity="0.5">
    <circle cx="0" cy="0" r="4" fill="#8B6B4A"/>
    <rect x="-3" y="5" width="6" height="10" rx="2" fill="#2A5A8C"/>
  </g>

  <!-- Decorative corner elements -->
  <circle cx="15" cy="15" r="8" fill="#F59E0B" opacity="0.1"/>
  <circle cx="285" cy="285" r="8" fill="#E0521E" opacity="0.1"/>
  <circle cx="285" cy="15" r="6" fill="#F59E0B" opacity="0.08"/>
  <circle cx="15" cy="285" r="6" fill="#E0521E" opacity="0.08"/>
</svg>
