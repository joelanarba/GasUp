<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="bgVerify" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E7"/>
      <stop offset="100%" stop-color="#FFE8C4"/>
    </linearGradient>
    <linearGradient id="scaleBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B8B8B"/>
      <stop offset="100%" stop-color="#6B6B6B"/>
    </linearGradient>
    <linearGradient id="scalePlatform" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0A0A0"/>
      <stop offset="100%" stop-color="#8B8B8B"/>
    </linearGradient>
    <linearGradient id="cylGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E0521E"/>
      <stop offset="35%" stop-color="#E86A3A"/>
      <stop offset="100%" stop-color="#C4412E"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B8C3A"/>
      <stop offset="100%" stop-color="#3D6B22"/>
    </linearGradient>
    <filter id="vShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#141413" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" rx="16" fill="url(#bgVerify)"/>

  <!-- Decorative elements -->
  <circle cx="250" cy="50" r="30" fill="#F59E0B" opacity="0.07"/>
  <circle cx="50" cy="250" r="25" fill="#E0521E" opacity="0.06"/>

  <!-- Weighing scale -->
  <g transform="translate(90, 100)" filter="url(#vShadow)">
    <!-- Scale pillar -->
    <rect x="50" y="60" width="20" height="110" rx="3" fill="url(#scaleBase)"/>

    <!-- Scale base -->
    <rect x="10" y="165" width="100" height="15" rx="4" fill="#6B6B6B"/>
    <rect x="5" y="175" width="110" height="10" rx="3" fill="#5A5A5A"/>

    <!-- Digital display area -->
    <rect x="35" y="90" width="50" height="30" rx="4" fill="#2A2A2A"/>
    <rect x="38" y="93" width="44" height="24" rx="2" fill="#1A3A1A"/>
    <!-- Display reading (abstract bars suggesting weight) -->
    <rect x="42" y="100" width="6" height="12" rx="1" fill="#5B8C3A" opacity="0.8"/>
    <rect x="50" y="97" width="6" height="15" rx="1" fill="#5B8C3A" opacity="0.8"/>
    <rect x="58" y="103" width="6" height="9" rx="1" fill="#5B8C3A" opacity="0.8"/>
    <rect x="66" y="99" width="6" height="13" rx="1" fill="#5B8C3A" opacity="0.6"/>

    <!-- Scale platform/plate -->
    <rect x="-5" y="48" width="130" height="14" rx="4" fill="url(#scalePlatform)"/>
    <rect x="0" y="46" width="120" height="6" rx="3" fill="#B0B0B0"/>

    <!-- Gas cylinder on scale -->
    <g transform="translate(35, -30)">
      <!-- Cylinder body -->
      <rect x="0" y="8" width="50" height="68" rx="20" fill="url(#cylGrad)"/>
      <!-- Top dome -->
      <ellipse cx="25" cy="12" rx="25" ry="8" fill="#E86A3A"/>
      <!-- Valve -->
      <rect x="15" y="-2" width="20" height="14" rx="8" fill="#C4412E"/>
      <rect x="19" y="-8" width="12" height="10" rx="6" fill="#8A8A8A"/>
      <rect x="22" y="-12" width="6" height="6" rx="3" fill="#6A6A6A"/>
      <!-- Bands -->
      <rect x="3" y="35" width="44" height="3" rx="1" fill="#C4412E" opacity="0.4"/>
      <rect x="3" y="55" width="44" height="3" rx="1" fill="#C4412E" opacity="0.4"/>
      <!-- Bottom ring -->
      <rect x="-2" y="72" width="54" height="6" rx="3" fill="#B03A15"/>
      <!-- Highlight -->
      <rect x="10" y="18" width="6" height="40" rx="3" fill="#FF8C50" opacity="0.25"/>
    </g>
  </g>

  <!-- Shield with checkmark -->
  <g transform="translate(195, 55)" filter="url(#vShadow)">
    <!-- Shield shape -->
    <path d="M0,-35 L30,-25 L30,10 Q30,35 0,45 Q-30,35 -30,10 L-30,-25 Z" fill="url(#shieldGrad)"/>
    <!-- Inner shield -->
    <path d="M0,-28 L24,-20 L24,8 Q24,28 0,38 Q-24,28 -24,8 L-24,-20 Z" fill="#6B9C4A" opacity="0.7"/>

    <!-- Checkmark -->
    <path d="M-14,4 L-4,14 L16,-10" fill="none" stroke="#FFF8E7" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Glow ring around shield -->
    <path d="M0,-40 L34,-29 L34,12 Q34,40 0,50 Q-34,40 -34,12 L-34,-29 Z" fill="none" stroke="#5B8C3A" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Weight indicators / abstract -->
  <g transform="translate(40, 60)">
    <!-- Small weight icon -->
    <path d="M0,0 L15,0 L12,15 L3,15 Z" fill="#8B7355" opacity="0.4"/>
    <rect x="1" y="-3" width="13" height="4" rx="2" fill="#8B7355" opacity="0.5"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="30" cy="150" r="3" fill="#F59E0B" opacity="0.15"/>
  <circle cx="275" cy="200" r="2" fill="#E0521E" opacity="0.12"/>
  <circle cx="260" cy="280" r="3" fill="#F59E0B" opacity="0.1"/>
  <circle cx="40" cy="40" r="2" fill="#E0521E" opacity="0.1"/>

  <!-- Curved lines decoration -->
  <path d="M270,130 Q280,150 270,170" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.2"/>
  <path d="M275,135 Q285,150 275,165" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.15"/>
</svg>
