<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="bgPred" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E7"/>
      <stop offset="100%" stop-color="#FFE8C4"/>
    </linearGradient>
    <linearGradient id="gaugeRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0521E"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="gaugeInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="bellGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D4860A"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#141413" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" rx="16" fill="url(#bgPred)"/>

  <!-- Decorative circles in background -->
  <circle cx="40" cy="40" r="25" fill="#F59E0B" opacity="0.08"/>
  <circle cx="260" cy="260" r="35" fill="#E0521E" opacity="0.06"/>
  <circle cx="270" cy="50" r="20" fill="#F59E0B" opacity="0.06"/>

  <!-- Main gauge -->
  <g transform="translate(150, 160)" filter="url(#softShadow)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="85" fill="none" stroke="url(#gaugeRing)" stroke-width="8"/>

    <!-- Inner circle -->
    <circle cx="0" cy="0" r="75" fill="url(#gaugeInner)"/>

    <!-- Gauge tick marks -->
    <g stroke="#C4956A" stroke-width="2" opacity="0.5">
      <line x1="0" y1="-70" x2="0" y2="-60" transform="rotate(-120)"/>
      <line x1="0" y1="-70" x2="0" y2="-60" transform="rotate(-90)"/>
      <line x1="0" y1="-70" x2="0" y2="-60" transform="rotate(-60)"/>
      <line x1="0" y1="-70" x2="0" y2="-60" transform="rotate(-30)"/>
      <line x1="0" y1="-70" x2="0" y2="-60" transform="rotate(0)"/>
      <line x1="0" y1="-70" x2="0" y2="-60" transform="rotate(30)"/>
      <line x1="0" y1="-70" x2="0" y2="-60" transform="rotate(60)"/>
      <line x1="0" y1="-70" x2="0" y2="-60" transform="rotate(90)"/>
      <line x1="0" y1="-70" x2="0" y2="-60" transform="rotate(120)"/>
    </g>

    <!-- Major tick marks -->
    <g stroke="#8B6B4A" stroke-width="3">
      <line x1="0" y1="-72" x2="0" y2="-58" transform="rotate(-120)"/>
      <line x1="0" y1="-72" x2="0" y2="-58" transform="rotate(0)"/>
      <line x1="0" y1="-72" x2="0" y2="-58" transform="rotate(120)"/>
    </g>

    <!-- Color zones on gauge arc -->
    <!-- Green zone (full) -->
    <path d="M-60,-37 A70,70 0 0,0 -70,0" stroke="#5B8C3A" stroke-width="6" fill="none" opacity="0.4"/>
    <!-- Amber zone (medium) -->
    <path d="M-70,0 A70,70 0 0,0 -37,60" stroke="#F59E0B" stroke-width="6" fill="none" opacity="0.5"/>
    <!-- Red zone (low) -->
    <path d="M-37,60 A70,70 0 0,0 37,60" stroke="#E0521E" stroke-width="6" fill="none" opacity="0.5"/>

    <!-- Needle pointing to amber zone (suggesting it's getting low) -->
    <line x1="0" y1="5" x2="-50" y2="40" stroke="#E0521E" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="6" fill="#E0521E"/>
    <circle cx="0" cy="0" r="3" fill="#C4412E"/>

    <!-- Small gas cylinder icon in center-bottom of gauge -->
    <g transform="translate(-8, 18)">
      <rect x="0" y="0" width="16" height="28" rx="6" fill="#E0521E" opacity="0.6"/>
      <rect x="2" y="-3" width="12" height="5" rx="2" fill="#C4412E" opacity="0.5"/>
      <rect x="5" y="-6" width="6" height="4" rx="3" fill="#8A8A8A" opacity="0.5"/>
    </g>
  </g>

  <!-- Notification bell -->
  <g transform="translate(220, 70)" filter="url(#softShadow)">
    <!-- Bell notification circle -->
    <circle cx="18" cy="-5" r="10" fill="#E0521E"/>
    <circle cx="18" cy="-5" r="7" fill="#E0521E" opacity="0.8"/>

    <!-- Exclamation in notification -->
    <rect x="16" y="-11" width="4" height="8" rx="1" fill="#FFF8E7"/>
    <circle cx="18" cy="0" r="1.5" fill="#FFF8E7"/>

    <!-- Bell body -->
    <path d="M0,0 Q0,-25 -15,-25 Q-28,-25 -28,-5 L-32,0 L4,0 Z" fill="url(#bellGrad)"/>
    <!-- Bell opening -->
    <rect x="-34" y="-2" width="40" height="6" rx="3" fill="#D4860A"/>
    <!-- Bell clapper -->
    <circle cx="-14" cy="7" r="4" fill="#C4860A"/>
    <!-- Bell top -->
    <rect x="-16" y="-28" width="4" height="5" rx="2" fill="#D4860A"/>

    <!-- Sound waves -->
    <path d="M6,"-8" Q12,-12 6,-16" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.5"/>
    <path d="M10,-6 Q18,-12 10,-18" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Dashed prediction line (abstract) -->
  <path d="M60,240 Q100,200 140,210 Q180,220 220,180" stroke="#F59E0B" stroke-width="2" stroke-dasharray="6,4" fill="none" opacity="0.4"/>
  <circle cx="220" cy="180" r="4" fill="#F59E0B" opacity="0.5"/>

  <!-- Small decorative dots -->
  <circle cx="50" cy="270" r="3" fill="#F59E0B" opacity="0.15"/>
  <circle cx="70" cy="255" r="2" fill="#E0521E" opacity="0.12"/>
  <circle cx="250" cy="240" r="2.5" fill="#F59E0B" opacity="0.12"/>
</svg>
