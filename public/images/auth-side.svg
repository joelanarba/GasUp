<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E7"/>
      <stop offset="60%" stop-color="#FFE8C4"/>
      <stop offset="100%" stop-color="#FFDAA0"/>
    </linearGradient>
    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5E6D0"/>
      <stop offset="100%" stop-color="#E8D5B8"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#C49060"/>
    </linearGradient>
    <linearGradient id="cylinderGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E0521E"/>
      <stop offset="40%" stop-color="#E86A3A"/>
      <stop offset="100%" stop-color="#C4412E"/>
    </linearGradient>
    <radialGradient id="ambientLight" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="600" fill="url(#bgGrad)"/>

  <!-- Ambient warm light overlay -->
  <rect width="400" height="600" fill="url(#ambientLight)"/>

  <!-- Wall -->
  <rect x="0" y="0" width="400" height="440" fill="url(#wallGrad)"/>

  <!-- Floor -->
  <rect x="0" y="440" width="400" height="160" fill="url(#floorGrad)"/>
  <!-- Floor tiles pattern -->
  <line x1="0" y1="440" x2="400" y2="440" stroke="#B8845A" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="500" x2="400" y2="500" stroke="#B8845A" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="560" x2="400" y2="560" stroke="#B8845A" stroke-width="0.5" opacity="0.2"/>
  <line x1="80" y1="440" x2="80" y2="600" stroke="#B8845A" stroke-width="0.5" opacity="0.15"/>
  <line x1="160" y1="440" x2="160" y2="600" stroke="#B8845A" stroke-width="0.5" opacity="0.15"/>
  <line x1="240" y1="440" x2="240" y2="600" stroke="#B8845A" stroke-width="0.5" opacity="0.15"/>
  <line x1="320" y1="440" x2="320" y2="600" stroke="#B8845A" stroke-width="0.5" opacity="0.15"/>

  <!-- Window on wall -->
  <g transform="translate(250, 60)">
    <rect x="0" y="0" width="100" height="120" rx="3" fill="#87CEEB" opacity="0.4"/>
    <rect x="5" y="5" width="90" height="110" rx="2" fill="#C8E6FF" opacity="0.5"/>
    <!-- Window frame -->
    <rect x="0" y="0" width="100" height="120" rx="3" fill="none" stroke="#C4956A" stroke-width="4"/>
    <line x1="50" y1="0" x2="50" y2="120" stroke="#C4956A" stroke-width="2"/>
    <line x1="0" y1="60" x2="100" y2="60" stroke="#C4956A" stroke-width="2"/>
    <!-- Curtain left -->
    <path d="M5,5 Q15,30 8,60 Q12,80 5,110" fill="#E0521E" opacity="0.3" stroke="none"/>
    <!-- Curtain right -->
    <path d="M95,5 Q85,30 92,60 Q88,80 95,110" fill="#E0521E" opacity="0.3" stroke="none"/>
    <!-- Sunlight through window -->
    <path d="M0,120 L-40,300 L140,300 L100,120 Z" fill="#F59E0B" opacity="0.06"/>
  </g>

  <!-- Kitchen counter/shelf on left wall -->
  <g transform="translate(10, 300)">
    <!-- Counter surface -->
    <rect x="0" y="0" width="140" height="8" rx="2" fill="#8B6B4A"/>
    <!-- Counter body -->
    <rect x="0" y="8" width="140" height="132" rx="2" fill="#A0845C"/>
    <!-- Cabinet doors -->
    <rect x="5" y="15" width="60" height="60" rx="2" fill="#8B7355"/>
    <rect x="75" y="15" width="60" height="60" rx="2" fill="#8B7355"/>
    <!-- Handles -->
    <rect x="58" y="38" width="4" height="14" rx="2" fill="#C4956A"/>
    <rect x="78" y="38" width="4" height="14" rx="2" fill="#C4956A"/>
    <!-- Lower cabinets -->
    <rect x="5" y="82" width="60" height="50" rx="2" fill="#8B7355"/>
    <rect x="75" y="82" width="60" height="50" rx="2" fill="#8B7355"/>
    <rect x="58" y="102" width="4" height="12" rx="2" fill="#C4956A"/>
    <rect x="78" y="102" width="4" height="12" rx="2" fill="#C4956A"/>

    <!-- Items on counter -->
    <!-- Pot -->
    <rect x="15" y="-18" width="30" height="18" rx="3" fill="#6B6B6B"/>
    <rect x="12" y="-20" width="36" height="4" rx="2" fill="#8B8B8B"/>
    <rect x="7" y="-16" width="8" height="3" rx="1" fill="#8B8B8B"/>
    <rect x="45" y="-16" width="8" height="3" rx="1" fill="#8B8B8B"/>

    <!-- Plate -->
    <ellipse cx="90" cy="-5" rx="18" ry="5" fill="#FFF8E7"/>
    <ellipse cx="90" cy="-6" rx="14" ry="3.5" fill="#FFE8C4"/>

    <!-- Bottle -->
    <rect x="115" y="-25" width="10" height="25" rx="3" fill="#5B8C3A" opacity="0.7"/>
    <rect x="117" y="-30" width="6" height="7" rx="2" fill="#5B8C3A" opacity="0.8"/>
  </g>

  <!-- Wall shelf above counter -->
  <g transform="translate(20, 240)">
    <rect x="0" y="0" width="120" height="6" rx="1" fill="#8B6B4A"/>
    <!-- Shelf brackets -->
    <path d="M5,6 L5,20 L0,20" fill="none" stroke="#6B4B2A" stroke-width="2"/>
    <path d="M115,6 L115,20 L120,20" fill="none" stroke="#6B4B2A" stroke-width="2"/>
    <!-- Items on shelf -->
    <rect x="10" y="-22" width="14" height="22" rx="2" fill="#D4A574"/>
    <rect x="30" y="-18" width="12" height="18" rx="2" fill="#E0521E" opacity="0.6"/>
    <rect x="50" y="-15" width="10" height="15" rx="2" fill="#F59E0B" opacity="0.5"/>
    <circle cx="78" cy="-8" r="8" fill="#C49060"/>
    <rect x="94" y="-20" width="14" height="20" rx="2" fill="#8B7355"/>
  </g>

  <!-- Gas stove (small, on counter edge) -->
  <g transform="translate(80, 274)">
    <rect x="0" y="0" width="45" height="8" rx="2" fill="#4A4A4A"/>
    <rect x="2" y="2" width="41" height="4" rx="1" fill="#3A3A3A"/>
    <!-- Burner rings -->
    <circle cx="14" cy="1" r="6" fill="none" stroke="#6B6B6B" stroke-width="1"/>
    <circle cx="14" cy="1" r="3" fill="none" stroke="#6B6B6B" stroke-width="0.5"/>
    <circle cx="33" cy="1" r="6" fill="none" stroke="#6B6B6B" stroke-width="1"/>
    <circle cx="33" cy="1" r="3" fill="none" stroke="#6B6B6B" stroke-width="0.5"/>
    <!-- Flame on one burner -->
    <g transform="translate(14, -2)">
      <ellipse cx="0" cy="0" rx="4" ry="3" fill="#F59E0B" opacity="0.7"/>
      <ellipse cx="0" cy="0" rx="2.5" ry="2" fill="#FF6B35" opacity="0.5"/>
    </g>
    <!-- Knobs -->
    <circle cx="8" cy="8" r="2" fill="#8A8A8A"/>
    <circle cx="22" cy="8" r="2" fill="#8A8A8A"/>
    <circle cx="36" cy="8" r="2" fill="#8A8A8A"/>
  </g>

  <!-- Gas cylinder -->
  <g transform="translate(280, 340)">
    <!-- Shadow -->
    <ellipse cx="0" cy="100" rx="28" ry="6" fill="#141413" opacity="0.1"/>
    <!-- Cylinder body -->
    <rect x="-22" y="15" width="44" height="80" rx="18" fill="url(#cylinderGrad)"/>
    <!-- Top dome -->
    <ellipse cx="0" cy="18" rx="22" ry="8" fill="#E86A3A"/>
    <!-- Valve area -->
    <rect x="-8" y="2" width="16" height="16" rx="6" fill="#C4412E"/>
    <!-- Valve handle -->
    <rect x="-5" y="-5" width="10" height="10" rx="5" fill="#8A8A8A"/>
    <rect x="-2" y="-8" width="4" height="5" rx="2" fill="#6A6A6A"/>
    <!-- Cylinder bands -->
    <rect x="-20" y="45" width="40" height="3" rx="1" fill="#C4412E" opacity="0.5"/>
    <rect x="-20" y="70" width="40" height="3" rx="1" fill="#C4412E" opacity="0.5"/>
    <!-- Bottom ring -->
    <rect x="-24" y="90" width="48" height="8" rx="3" fill="#B03A15"/>
    <!-- Highlight -->
    <rect x="-12" y="25" width="6" height="50" rx="3" fill="#FF8C50" opacity="0.3"/>
    <!-- Hose -->
    <path d="M8,8 Q30,0 50,-15 Q70,-25 85,-20" stroke="#4A4A4A" stroke-width="3" fill="none"/>
    <path d="M8,8 Q30,0 50,-15 Q70,-25 85,-20" stroke="#6A6A6A" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Student figure -->
  <g transform="translate(190, 210)">
    <!-- Shadow -->
    <ellipse cx="5" cy="230" rx="30" ry="7" fill="#141413" opacity="0.12"/>

    <!-- Legs -->
    <rect x="-10" y="155" width="12" height="65" rx="4" fill="#2A5A8C"/>
    <rect x="5" y="155" width="12" height="65" rx="4" fill="#2A5A8C"/>

    <!-- Shoes -->
    <path d="M-13,218 L-13,225 Q-10,228 2,228 L2,218 Z" fill="#4A3A2A" rx="2"/>
    <path d="M5,218 L5,225 Q8,228 18,228 L18,218 Z" fill="#4A3A2A" rx="2"/>

    <!-- Body/torso -->
    <rect x="-14" y="60" width="35" height="100" rx="6" fill="#F59E0B"/>
    <!-- Shirt collar -->
    <path d="M-5,60 L3,72 L11,60" fill="#E0521E" opacity="0.6"/>

    <!-- Left arm (resting on cylinder) -->
    <rect x="-22" y="68" width="10" height="50" rx="4" fill="#8B6B4A" transform="rotate(-5,-17,90)"/>
    <!-- Left hand on cylinder top -->
    <circle cx="88" cy="135" r="6" fill="#8B6B4A"/>

    <!-- Right arm (relaxed at side) -->
    <rect x="18" y="68" width="10" height="45" rx="4" fill="#8B6B4A" transform="rotate(8,23,90)"/>
    <!-- Right hand -->
    <circle cx="28" cy="115" r="5" fill="#8B6B4A"/>

    <!-- Phone in right hand -->
    <rect x="23" y="108" width="12" height="20" rx="2" fill="#2A2A2A"/>
    <rect x="24" y="110" width="10" height="15" rx="1" fill="#4A8AC4" opacity="0.7"/>

    <!-- Neck -->
    <rect x="-2" y="48" width="10" height="14" rx="3" fill="#8B6B4A"/>

    <!-- Head -->
    <circle cx="3" cy="35" r="22" fill="#8B6B4A"/>

    <!-- Hair (short, textured) -->
    <path d="M-17,28 Q-18,12 -10,8 Q-2,2 8,4 Q18,6 22,14 Q24,22 22,28" fill="#1A0A00"/>
    <circle cx="-10" cy="18" r="3" fill="#1A0A00" opacity="0.5"/>
    <circle cx="0" cy="14" r="3" fill="#1A0A00" opacity="0.5"/>
    <circle cx="10" cy="16" r="3" fill="#1A0A00" opacity="0.5"/>

    <!-- Face -->
    <!-- Eyes -->
    <ellipse cx="-5" cy="33" rx="2.5" ry="2" fill="#1A0A00"/>
    <ellipse cx="9" cy="33" rx="2.5" ry="2" fill="#1A0A00"/>
    <!-- Eyebrows -->
    <path d="M-9,28 Q-5,26 -2,28" fill="none" stroke="#1A0A00" stroke-width="1.2"/>
    <path d="M6,28 Q9,26 13,28" fill="none" stroke="#1A0A00" stroke-width="1.2"/>
    <!-- Nose -->
    <path d="M2,36 Q0,40 2,42 Q4,40 2,36" fill="#7B5B3A" opacity="0.5"/>
    <!-- Confident smile -->
    <path d="M-4,46 Q3,52 10,46" fill="none" stroke="#6B4B2A" stroke-width="1.5"/>
    <!-- Ear -->
    <ellipse cx="-18" cy="36" rx="4" ry="6" fill="#7B5B3A"/>

    <!-- Earring -->
    <circle cx="-18" cy="42" r="1.5" fill="#F59E0B"/>
  </g>

  <!-- Warm decorative elements -->
  <!-- Wall art / kente-inspired pattern -->
  <g transform="translate(30, 80)">
    <rect x="0" y="0" width="60" height="80" rx="2" fill="none" stroke="#C4956A" stroke-width="2"/>
    <!-- Kente-inspired pattern -->
    <rect x="5" y="5" width="50" height="14" fill="#E0521E" opacity="0.4"/>
    <rect x="5" y="23" width="50" height="14" fill="#F59E0B" opacity="0.4"/>
    <rect x="5" y="41" width="50" height="14" fill="#2D5A3D" opacity="0.3"/>
    <rect x="5" y="59" width="50" height="14" fill="#E0521E" opacity="0.4"/>
    <!-- Vertical stripes -->
    <rect x="15" y="5" width="6" height="68" fill="#F59E0B" opacity="0.3"/>
    <rect x="35" y="5" width="6" height="68" fill="#E0521E" opacity="0.2"/>
  </g>

  <!-- Warm glow from window -->
  <circle cx="300" cy="120" r="100" fill="#F59E0B" opacity="0.05"/>
</svg>
